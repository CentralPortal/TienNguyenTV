                        youtubeLink: "https://youtu.be/n0avOoi6dwo", // Added YouTube link
                        
                    },
                    {
                        item: "Essential Care",
                        description: {
                            paragraph: "A warm pair of socks, a simple first aid kit—these little things, often taken for granted, can mean a world of difference to someone living in extreme poverty.",
                            items: [
                                "Boots",
                                "Bath soap",
                                "5 pcs Toothbrush",
                                "Toothpaste",
                                "10 pairs Socks",
                                "10 pairs Gloves",
                                "Backpack",
                                "First aid kit"
                            ]
                        },
                        amount: "$56",
                        imageUrl: "https://raw.githubusercontent.com/CentralPortal/TienNguyenTV/main/images/essential-care-VN.jpeg",
                        notes: []
                    },
                    {
                        item: "Trại Gà",
                        description: {
                            paragraph: "<strong>Hãy cùng chung tay biến trang trại gà này thành hiện thực!</strong><br><br>Những đóng góp của bạn sẽ giúp xây dựng một trang trại gà bền vững, bắt đầu với đàn gà ban đầu gồm 100 con. Khi chúng sinh sôi, chúng tôi sẽ tặng 10-15 con gà cùng một chuồng gà nhỏ cho các gia đình khó khăn khác nhau. Các gia đình sẽ có trứng để bổ sung dinh dưỡng rất cần thiết và có thể bán gà để có thêm thu nhập, giúp họ đủ tiền mua thuốc men, đồ dùng học tập hoặc thậm chí cải thiện nhà cửa. Đây là con đường thoát khỏi cảnh nghèo cùng cực, mang lại cho họ phẩm giá và một tương lai tươi sáng hơn.",                       
                        },
                        amount: "50.000.000 - 100.000.000+ ₫",
                        imageUrl: "https://raw.githubusercontent.com/CentralPortal/TienNguyenTV/main/images/chicken-farm.jpeg",
                        notes: [
                            "Hãy giúp đạt được mục tiêu chung - hãy quyên góp những gì bạn có thể!"
                        ]
                    }
                ]
            }
        };

        const languageSelect = document.getElementById('language-select');
        const sortSelect = document.getElementById('sort-select');
        const reportHeader = document.getElementById('report-header');
        const languageLabel = document.getElementById('language-label');
        const sortLabel = document.getElementById('sort-label');
        const globalNoteElement = document.getElementById('global-note');
        const itemsContainer = document.getElementById('items-container');

        // Helper function to parse amount strings into a comparable number
        function parseAmount(amountString) {
            if (amountString.includes('Bất kì') || amountString.includes('Any')) {
                return 0; // Treat "Any" as 0 for consistent sorting
            }
            // Remove currency symbols, commas, and spaces, then parse the first number in a range
            const cleanedAmount = amountString.replace(/[₫$,]/g, '').trim();
            const firstValue = parseFloat(cleanedAmount.split('-')[0].trim());
            return isNaN(firstValue) ? 0 : firstValue; // Return 0 if parsing fails
        }

        // Function to scroll to the top of the page
        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth' // Smooth scrolling
            });
        }

        // Function to render items based on the selected language and sort order
        function renderItems() {
            const currentLang = languageSelect.value;
            console.log("DEBUG: currentLang:", currentLang); // Added for debugging
            const sortBy = sortSelect.value;
            const currentData = itemsData[currentLang];

            if (!currentData) {
                console.error(`DEBUG: Data for language "${currentLang}" is undefined. This might be due to an invalid language selection or missing data in itemsData.`);
                return; // Stop execution if data is missing
            }

            reportHeader.textContent = currentData.header;
            languageLabel.textContent = currentData.selectLabel;
            sortLabel.textContent = currentLang === 'vi' ? 'Sắp xếp theo:' : 'Sort by:';
            globalNoteElement.textContent = currentData.globalNote;

            // Update sort options text based on language
            sortSelect.options[0].textContent = currentData.sortLabels.item;
            sortSelect.options[1].textContent = currentData.sortLabels.amount;

            // Create a copy of the items array to sort
            const sortedItems = [...currentData.items];

            if (sortBy === 'item') {
                sortedItems.sort((a, b) => a.item.localeCompare(b.item));
            } else if (sortBy === 'amount') {
                sortedItems.sort((a, b) => parseAmount(a.amount) - parseAmount(b.amount));
            }

            itemsContainer.innerHTML = ''; // Clear previous items

            sortedItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-xl shadow-md p-6 border border-gray-200 hover:shadow-lg transition-shadow duration-300 flex flex-col sm:flex-row items-start relative'; // Added relative for absolute positioning of scroll button

                const imageContainer = document.createElement('div');
                // Apply max-width to the imageContainer itself for consistent width limit
                imageContainer.className = 'flex-shrink-0 mb-4 sm:mb-0 sm:mr-6 max-w-[300px] w-full';

                if (item.videoUrl) {
                    const videoWrapper = document.createElement('div');
                    // Use padding-bottom for aspect ratio, it will dictate the height
                    videoWrapper.className = 'relative pb-[56.25%] overflow-hidden rounded-md'; // 16:9 Aspect Ratio container

                    const videoIframe = document.createElement('iframe');
                    videoIframe.src = item.videoUrl + '?autoplay=0&controls=1'; // Add autoplay=0 and controls=1
                    videoIframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
                    videoIframe.allowFullscreen = true;
                    videoIframe.className = 'absolute top-0 left-0 w-full h-full rounded-md'; // Fill the container
                    videoIframe.setAttribute('frameborder', '0'); // Good practice for iframes

                    videoWrapper.appendChild(videoIframe);
                    imageContainer.appendChild(videoWrapper);

                    if (item.youtubeLink) {
                        const youtubeLinkDiv = document.createElement('div');
                        youtubeLinkDiv.className = 'text-center mt-2';
                        const youtubeAnchor = document.createElement('a');
                        youtubeAnchor.href = item.youtubeLink;
                        youtubeAnchor.target = '_blank';
                        youtubeAnchor.className = 'text-blue-500 hover:text-blue-700 font-semibold text-sm';
                        youtubeAnchor.textContent = currentLang === 'vi' ? 'Xem trên YouTube' : 'View on YouTube';
                        youtubeLinkDiv.appendChild(youtubeAnchor);
                        imageContainer.appendChild(youtubeLinkDiv);
                    }

                } else {
                    const itemImage = document.createElement('img');
                    itemImage.src = item.imageUrl;
                    itemImage.alt = item.item;
                    // Check if the current item is one of the specified items for object-contain
                    const itemsToContain = [
                        "Portable Cooking Oven", "Solar Fan",
                        "Bếp Nấu Ăn Di Động", "Quạt Năng Lượng Mặt Trời"
                    ];
                    if (itemsToContain.includes(item.item)) {
                        itemImage.className = 'w-full h-48 object-contain rounded-md'; // Changed to object-contain
                    } else {
                        itemImage.className = 'w-full h-48 object-cover rounded-md'; // Default object-cover
                    }
                    
                    itemImage.onerror = function() {
                        this.onerror=null;
                        this.src=`https://placehold.co/300x200/CCCCCC/666666?text=Image+Not+Found`;
                    };
                    imageContainer.appendChild(itemImage);
                }
                card.appendChild(imageContainer);

                const contentContainer = document.createElement('div');
                contentContainer.className = 'flex-grow';

                const itemTitle = document.createElement('h2');
                itemTitle.className = 'text-2xl font-semibold text-blue-700 mb-2';
                itemTitle.textContent = item.item;
                contentContainer.appendChild(itemTitle);

                // Description rendering logic
                const descriptionContentDiv = document.createElement('div');
                descriptionContentDiv.className = 'text-gray-700 text-base mb-3';

                // Check if description exists and has the new structured format
                if (item.description && typeof item.description === 'object' && item.description.paragraph !== undefined) {
                    // Add the main paragraph
                    if (item.description.paragraph) {
                        const p = document.createElement('p');
                        p.innerHTML = item.description.paragraph.trim(); // Use innerHTML to render strong and br tags
                        descriptionContentDiv.appendChild(p);
                    }

                    // Add the bulletized items if they exist
                    if (item.description.items && item.description.items.length > 0) {
                        const ul = document.createElement('ul');
                        ul.className = 'list-disc ml-[10%] space-y-1 mt-2';
                        item.description.items.forEach(listItem => {
                            const li = document.createElement('li');
                            li.textContent = listItem.trim();
                            ul.appendChild(li);
                        });
                        descriptionContentDiv.appendChild(ul);
                    }
                } else if (typeof item.description === 'string' && item.description.trim() !== '') {
                    // Fallback for old string format if it still exists in any item
                    const parts = item.description.split('Items:');
                    const paragraph = parts[0].trim();
                    const itemsList = parts.length > 1 ? parts[1].split('\n').map(line => line.trim()).filter(line => line !== '') : [];

                    if (paragraph) {
                        const p = document.createElement('p');
                        p.innerHTML = paragraph; // Use innerHTML for fallback too
                        descriptionContentDiv.appendChild(p);
                    }

                    if (itemsList.length > 0) {
                        const ul = document.createElement('ul');
                        ul.className = 'list-disc ml-[10%] space-y-1 mt-2';
                        itemsList.forEach(listItem => {
                            const li = document.createElement('li');
                            li.textContent = listItem;
                            ul.appendChild(li);
                        });
                        descriptionContentDiv.appendChild(ul);
                    }
                }
                contentContainer.appendChild(descriptionContentDiv);

                const amountDiv = document.createElement('div');
                amountDiv.className = 'mb-4';
                const amountLabel = document.createElement('span');
                amountLabel.className = 'text-blue-600 font-bold text-lg';
                amountLabel.textContent = currentLang === 'vi' ? '👉 Số lượng ước tính:' : '👉 Estimated amount:';
                const amountValue = document.createElement('span');
                amountValue.className = 'text-black font-medium text-lg ml-2';
                amountValue.textContent = item.amount;
                amountDiv.appendChild(amountLabel);
                amountDiv.appendChild(amountValue);
                contentContainer.appendChild(amountDiv);

                // Notes section
                if (item.notes && item.notes.length > 0) {
                    const notesList = document.createElement('ul');
                    notesList.className = 'space-y-2';
                    item.notes.forEach((note, index) => {
                        const noteItem = document.createElement('li');
                        // Add flashing-footnote class if the note contains the specific text
                        if (note.includes('*** Đã quyên góp được') || note.includes('*** $1000 donated so far')) {
                            noteItem.className = `p-2 rounded-md ${index % 2 === 0 ? 'note-even' : 'note-odd'} flashing-footnote`;
                        } else {
                            noteItem.className = `p-2 rounded-md ${index % 2 === 0 ? 'note-even' : 'note-odd'}`;
                        }
                        const asteriskSpan = document.createElement('span');
                        asteriskSpan.className = 'font-bold text-gray-700 mr-2';
                        asteriskSpan.textContent = '*';
                        noteItem.appendChild(asteriskSpan);
                        noteItem.appendChild(document.createTextNode(note));
                        notesList.appendChild(noteItem);
                    });
                    contentContainer.appendChild(notesList);
                }

                card.appendChild(contentContainer);
                itemsContainer.appendChild(card);

                // Add scroll-to-top button to each card
                const scrollTopButton = document.createElement('button');
                scrollTopButton.className = 'absolute bottom-4 right-4 bg-blue-500 hover:bg-blue-600 text-white p-3 rounded-full shadow-lg transition-all duration-300 transform hover:scale-110 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-75';
                scrollTopButton.innerHTML = '<i class="fas fa-arrow-up"></i>'; // Font Awesome up arrow icon
                scrollTopButton.onclick = scrollToTop;
                card.appendChild(scrollTopButton);
            });
        }

        // Event listener for language selection change
        languageSelect.addEventListener('change', renderItems);

        // Event listener for sort selection change
        sortSelect.addEventListener('change', renderItems);

        // Initial render on page load (default to Vietnamese and sort by item title)
        document.addEventListener('DOMContentLoaded', () => {
            languageSelect.value = 'vi'; // Set default to Vietnamese
            sortSelect.value = 'item'; // Set default sort to item title
            renderItems();
        });
    </script>
</body>
</html>
